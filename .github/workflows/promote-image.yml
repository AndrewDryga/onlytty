name: Promote image

# Manual helper for image promotion. Terraform Cloud is the deployment authority:
# its VCS integration plans main changes, and a human approves applies there. This
# workflow only updates the TFC `container_image` variable to a pinned GHCR tag and
# queues a TFC run so the normal TFC approval gate can roll the MIG.
#
# Needs the TF_API_TOKEN secret: a TFC *user* or *team* token with Apply / "Queue
# plans" access to the workspace. An ORGANIZATION token can read/write variables but
# CANNOT create runs (the queue-run call 404s). No-ops if the token is unset.
#
# Token handling: the secret is masked by GitHub in logs, and we additionally keep it
# OUT of argv — it goes into a 0600 curl config file, never on a command line — so it
# can't leak via xtrace or a process listing. The script never echoes it, and never
# runs curl with -v/-x.
#
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version to promote, e.g. 0.4.1"
        required: true

concurrency:
  group: promote-image
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  promote:
    name: pin image + queue a TFC run
    runs-on: ubuntu-latest
    steps:
      - name: Pin container_image and queue a Terraform Cloud run
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [ -z "${TF_API_TOKEN:-}" ]; then
            echo "TF_API_TOKEN not set — skipping image promotion (configure it to enable)."
            exit 0
          fi

          org="OnlyTTY"
          workspace="onlytty"
          api="https://app.terraform.io/api/v2"

          # Keep the token out of argv (so it can't leak via xtrace or a process listing):
          # the auth headers live in a 0600 curl config file, never on a command line.
          # GitHub also masks the secret in logs — this is defense in depth. Removed on exit.
          umask 077
          curlcfg="$(mktemp)"
          trap 'rm -f "$curlcfg"' EXIT
          # Write the auth headers without ever tracing the token: we don't enable xtrace,
          # but { set +x; } guarantees the secret line is never echoed even if a future
          # change does. (The token is also masked by GitHub and kept out of argv below.)
          { set +x; } 2>/dev/null
          printf 'silent\nshow-error\nheader = "Authorization: Bearer %s"\nheader = "Content-Type: application/vnd.api+json"\n' "$TF_API_TOKEN" > "$curlcfg"

          # curl wrapper that surfaces the TFC error body instead of a bare exit code.
          # --config passes the auth headers, so the token never appears in the command.
          tf() {  # METHOD URL [DATA]
            local method="$1" url="$2" data="${3:-}" out code body
            if [ -n "$data" ]; then
              out=$(curl --config "$curlcfg" -w $'\n%{http_code}' -X "$method" "$url" -d "$data")
            else
              out=$(curl --config "$curlcfg" -w $'\n%{http_code}' -X "$method" "$url")
            fi
            code=${out##*$'\n'}
            body=${out%$'\n'*}
            if [ "${code:-000}" -lt 200 ] || [ "${code:-000}" -ge 300 ]; then
              echo "TFC API error: $method $url -> HTTP ${code:-(no response)}" >&2
              echo "${body}" | head -c 2000 >&2
              echo >&2
              if [ "${code:-000}" = "404" ]; then
                echo "hint: a 404 on POST /runs usually means the token can't queue runs — use a user/team token with Apply access, not an org token." >&2
              fi
              return 1
            fi
            printf '%s' "$body"
          }

          version="${INPUT_VERSION}"
          version="${version#v}"
          [ -n "$version" ] || { echo "no version (pass the workflow input)"; exit 1; }
          image="ghcr.io/$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')/onlytty:${version}"
          echo "Promoting image: $image"

          ws=$(tf GET "$api/organizations/$org/workspaces/$workspace" | jq -r '.data.id')
          [ -n "$ws" ] && [ "$ws" != "null" ] || { echo "could not resolve workspace $org/$workspace"; exit 1; }

          var=$(tf GET "$api/workspaces/$ws/vars" \
            | jq -r '.data[] | select(.attributes.key=="container_image") | .id')

          if [ -n "$var" ] && [ "$var" != "null" ]; then
            tf PATCH "$api/workspaces/$ws/vars/$var" \
              "$(jq -nc --arg id "$var" --arg v "$image" \
                '{data:{id:$id,type:"vars",attributes:{value:$v}}}')" >/dev/null
            echo "updated container_image -> $image"
          else
            tf POST "$api/workspaces/$ws/vars" \
              "$(jq -nc --arg v "$image" \
                '{data:{type:"vars",attributes:{key:"container_image",value:$v,category:"terraform"}}}')" >/dev/null
            echo "created container_image -> $image"
          fi

          run_id=$(tf POST "$api/runs" \
            "$(jq -nc --arg ws "$ws" --arg m "Promote $image" \
              '{data:{type:"runs",attributes:{message:$m},relationships:{workspace:{data:{type:"workspaces",id:$ws}}}}}')" \
            | jq -r '.data.id')

          echo "Queued TFC run: $run_id"
          {
            echo "### Image promotion queued — approve in Terraform Cloud"
            echo ""
            echo "Image: \`$image\`"
            echo ""
            echo "Run: https://app.terraform.io/app/$org/workspaces/$workspace/runs/$run_id"
          } >> "$GITHUB_STEP_SUMMARY"
