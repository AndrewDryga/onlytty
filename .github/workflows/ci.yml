name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runner:
    name: runner (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache-dependency-path: runner/go.sum
      - run: make runner-check

  web:
    name: web (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
      - run: make web-check

  portal:
    name: portal (elixir)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"
      - uses: actions/cache@v4
        with:
          path: portal/deps
          key: mix-${{ runner.os }}-${{ hashFiles('portal/mix.lock') }}
      - run: mix deps.get
        working-directory: portal
      - run: make server-check

  e2e:
    name: e2e (runner ↔ relay ↔ viewer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache-dependency-path: runner/go.sum
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
      - run: mix deps.get
        working-directory: portal
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: make e2e
