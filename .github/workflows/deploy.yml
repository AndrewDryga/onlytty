name: Deploy

# Rolls the production relay by replacing the regional MIG's instances (each re-pulls
# the onlytty image on boot via cloud-init). Runs after a release is published, or
# manually. No-ops until GCP Workload Identity Federation is wired up — set repo
# variables GCP_PROJECT / GCP_REGION and secrets GCP_WORKLOAD_IDENTITY_PROVIDER /
# GCP_SERVICE_ACCOUNT (see infra/README.md).

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Workload Identity Federation

jobs:
  deploy:
    name: roll the relay MIG
    runs-on: ubuntu-latest
    environment: production
    if: vars.GCP_PROJECT != ''
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Rolling-replace the MIG instances (each re-pulls the image on boot)
        run: |
          gcloud compute instance-groups managed rolling-action replace onlytty-mig \
            --region="${{ vars.GCP_REGION }}" --project="${{ vars.GCP_PROJECT }}" \
            --max-surge=1 --max-unavailable=0
