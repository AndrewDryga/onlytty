name: Release

# Tag-driven. Push v0.1.0 (or run manually) to publish the onlytty runner binaries
# (+ SHA256SUMS) as a GitHub Release and the portal server image to GHCR. Uses only
# GITHUB_TOKEN — no external secrets.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "tag to release (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  runner-binaries:
    name: runner binaries → release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # mint the OIDC token Sigstore signs the attestation with
      attestations: write # record the build provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache-dependency-path: runner/go.sum
      - name: Build linux/darwin × amd64/arm64
        working-directory: runner
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ../dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=$VERSION" -o onlytty .
            tar -czf "../dist/onlytty-$VERSION-$os-$arch.tar.gz" onlytty
            rm -f onlytty
          done
          cd ../dist && shasum -a 256 *.tar.gz > SHA256SUMS
      - name: Viewer asset manifest (SHA-256 of every served viewer file)
        run: make viewer-hash > dist/VIEWER_HASHES
      - name: Attest build provenance for the binaries
        # SLSA provenance for every tarball listed in SHA256SUMS. Keyless (Sigstore,
        # via the OIDC token) — no secrets. Verify: gh attestation verify <tarball> --repo <repo>
        uses: actions/attest-build-provenance@v2
        with:
          subject-checksums: dist/SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/onlytty-*.tar.gz
            dist/SHA256SUMS
            dist/VIEWER_HASHES

  portal-image:
    name: portal image → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # mint the OIDC token Sigstore signs the attestation with
      attestations: write # record the build provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Image name (GHCR requires lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/onlytty" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ./portal
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Attest build provenance for the image
        # Keyless SLSA provenance, pushed alongside the image in GHCR. Verify:
        # gh attestation verify oci://<image>:<tag> --repo <repo>
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
