name: Release

# Tag-driven. Push v0.1.0 (or run manually) to publish the onlytty runner binaries
# (+ SHA256SUMS) as a GitHub Release and the portal server image to GHCR. Uses only
# GITHUB_TOKEN — no external secrets.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "tag to release (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    name: gate (check + e2e + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: runner/go.mod
          cache-dependency-path: runner/go.sum
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: "29"
          elixir-version: "1.20"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "26"
      - run: mix deps.get
        working-directory: portal
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make check
      - run: make e2e
      - run: make audit

  runner-binaries:
    name: runner binaries → release
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # mint the OIDC token Sigstore signs the attestation with
      attestations: write # record the build provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: runner/go.mod
          cache-dependency-path: runner/go.sum
      - name: Build linux/darwin × amd64/arm64
        working-directory: runner
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ../dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=$VERSION" -o onlytty ./cmd/onlytty
            tar -czf "../dist/onlytty-$VERSION-$os-$arch.tar.gz" onlytty
            rm -f onlytty
          done
          cd ../dist && shasum -a 256 *.tar.gz > SHA256SUMS
      - name: Viewer asset manifest (SHA-256 of every served viewer file)
        run: make viewer-hash > dist/VIEWER_HASHES
      - name: Attest build provenance for the binaries
        # SLSA provenance for every tarball listed in SHA256SUMS. Keyless (Sigstore,
        # via the OIDC token) — no secrets. Verify: gh attestation verify <tarball> --repo <repo>
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS
      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/onlytty-*.tar.gz
            dist/SHA256SUMS
            dist/VIEWER_HASHES

  portal-image:
    name: portal image → GHCR
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # mint the OIDC token Sigstore signs the attestation with
      attestations: write # record the build provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Image name (GHCR requires lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/onlytty" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Multi-arch image so self-hosters on arm64 (Graviton, Ampere, Apple Silicon) can
      # pull and run without emulation. QEMU emulates arm64 for the build on the amd64
      # runner; buildx produces a single manifest list. The arm64 build runs the Elixir
      # release compile under emulation, so this step is slower than a single-arch build.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: build
        with:
          context: ./portal
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Attest build provenance for the image
        # Keyless SLSA provenance, pushed alongside the image in GHCR. Verify:
        # gh attestation verify oci://<image>:<tag> --repo <repo>
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
