# The *production* onlytty release image behind a Caddy proxy — a LOCAL TLS-terminating
# stand-in for the prod Google HTTPS LB (you can't run a Google LB locally), not the
# deployed topology itself. Driven by `make deploy-check`. SECRET_KEY_BASE comes from the environment.
services:
  onlytty:
    build:
      context: ../../portal
    environment:
      PHX_SERVER: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE}
      PHX_HOST: localhost
      PORT: "4000"
    expose:
      - "4000"
    ports:
      - "4001:4000" # direct (no proxy) — used to assert force_ssl redirects http→https

  caddy:
    image: caddy:2
    depends_on:
      - onlytty
    ports:
      - "4000:4000" # the "public" entrypoint the runner + viewer use
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
