<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex">
<title>OnlyTTY</title>
<link rel="stylesheet" href="/assets/vendor/xterm.css" integrity="sha384-8Xk9wy/gzEDUKrXtrmCFa2bBuK3BpjpDuL/p0SeKQX19Khl/M+lHOgD/CyYf7efP">
<style>
  :root { color-scheme: dark; --bg:#0b0e14; --bar:#11151f; --fg:#c8d3e0; --dim:#6b7689; --accent:#3b82f6; --ok:#22c55e; --warn:#f59e0b; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; -webkit-text-size-adjust:100%; }
  body { display:flex; flex-direction:column; overflow:hidden; }
  #bar { display:flex; align-items:center; gap:.5rem; padding:.45rem .6rem;
    padding-top: calc(.45rem + env(safe-area-inset-top)); background:var(--bar);
    border-bottom:1px solid #1c2333; font-size:.8rem; }
  /* Tools scroll horizontally on a narrow screen; #control is pinned OUTSIDE this
     scroll region so the primary action is never pushed off-screen. */
  #bar-tools { display:flex; align-items:center; gap:.4rem; flex:1 1 auto; min-width:0;
    overflow-x:auto; scrollbar-width:none; }
  #bar-tools::-webkit-scrollbar { display:none; }
  #status { display:inline-flex; align-items:center; gap:.4rem; color:var(--dim); flex:0 1 auto; min-width:0; }
  #status-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #dot { width:.5rem; height:.5rem; border-radius:50%; background:var(--dim); flex:0 0 auto; }
  #dot.ok { background:var(--ok); } #dot.warn { background:var(--warn); }
  /* Fingerprint is verify-once info, so it's a compact tappable chip (truncated;
     tap shows the full value to compare with the terminal). */
  .fp { flex:0 0 auto; max-width:6rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:var(--dim); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:.72rem;
    background:#1a2030; border-color:#2a3346; padding:.25rem .45rem; }
  .fp::before { content:"🔒 "; }
  #control { flex:0 0 auto; }
  button { background:#262e44; color:var(--fg); border:1px solid #3c465f; border-radius:.45rem;
    padding:.35rem .55rem; font-size:.8rem; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  button:active { background:#323c58; }
  button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  #control.live { background:var(--ok); border-color:var(--ok); color:#04210f; }
  /* 44px tap targets on touch (phones), where the bars are the primary input path. */
  body.touch #bar button, body.touch #keys button { min-height:44px; }
  #terminal { flex:1 1 auto; min-height:0; padding:.25rem; overflow:hidden; }
  #keys { display:none; gap:.3rem; padding:.4rem; padding-bottom: calc(.4rem + env(safe-area-inset-bottom));
    background:var(--bar); border-top:1px solid #1c2333; overflow-x:auto; scrollbar-width:none; }
  #keys::-webkit-scrollbar { display:none; }
  #keys button { flex:0 0 auto; min-width:2.6rem; font-family: ui-monospace, monospace; }
  #keys button.user-key { background:#2c3650; font-family: inherit; }
  body.touch #keys { display:flex; }
  /* shortcut editor (rendered into #overlay) */
  #sc-list { text-align:left; margin:.6rem 0; max-height:40vh; overflow-y:auto; }
  .sc-row { display:flex; align-items:center; gap:.5rem; padding:.3rem 0; border-bottom:1px solid #1c2333; }
  .sc-row .sc-label { flex:0 0 auto; min-width:4rem; font-size:.85rem; }
  .sc-row .sc-payload { flex:1 1 auto; min-width:0; color:var(--dim); font-size:.75rem;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sc-act { display:flex; gap:.25rem; flex:0 0 auto; }
  #sc-add { display:flex; gap:.4rem; margin:.6rem 0; }
  #sc-add input { width:auto; margin:0; }
  #sc-add #sc-label { flex:0 0 7rem; }
  #sc-add #sc-payload { flex:1 1 auto; min-width:0; }
  .sc-empty { color:var(--dim); }
  #overlay .sc-act button, #overlay #sc-add button { width:auto; background:#1b2030;
    border-color:#2a3346; color:var(--fg); padding:.3rem .5rem; }
  #overlay { position:fixed; inset:0; background:rgba(5,8,14,.92); display:flex; align-items:center;
    justify-content:center; padding:1.5rem; text-align:center; z-index:10; }
  #overlay[hidden] { display:none; }
  #overlay .card { max-width:30rem; }
  #overlay h1 { font-size:1.1rem; margin:0 0 .5rem; }
  #overlay p { color:var(--dim); font-size:.9rem; line-height:1.5; }
  #overlay input { width:100%; margin:.8rem 0; padding:.6rem; font-size:1rem; background:#0b0e14;
    color:var(--fg); border:1px solid #2a3346; border-radius:.45rem; }
  #overlay button { width:100%; padding:.6rem; background:var(--accent); border-color:var(--accent); color:#fff; }
</style>
</head>
<body>
  <div id="bar">
    <div id="bar-tools">
      <span id="status"><span id="dot"></span><span id="status-text">connecting…</span></span>
      <button id="fp" class="fp" title="Tap to verify against your terminal"></button>
      <button id="font-dec" title="Smaller">A−</button>
      <button id="font-inc" title="Larger">A+</button>
      <button id="keys-toggle" title="Show/hide key bar" aria-label="Show or hide the key bar">⌨</button>
      <button id="paste" title="Paste from clipboard">Paste</button>
    </div>
    <button id="control">Take control</button>
  </div>
  <div id="terminal"></div>
  <div id="keys">
    <button data-key="esc">Esc</button>
    <button data-key="tab">Tab</button>
    <button id="ctrl">Ctrl</button>
    <button data-key="up">↑</button>
    <button data-key="down">↓</button>
    <button data-key="left">←</button>
    <button data-key="right">→</button>
    <button data-key="bksp" aria-label="Backspace">⌫</button>
    <button data-key="enter" aria-label="Enter">⏎</button>
    <button data-key="ctrlc">^C</button>
    <button data-key="ctrld">^D</button>
    <button id="keys-edit" title="Edit shortcuts" aria-label="Edit shortcuts">＋</button>
  </div>
  <div id="overlay" hidden><div class="card" id="overlay-card"></div></div>

  <script src="/assets/vendor/xterm.js" integrity="sha384-M169f14mRZOXm3hD/v2Ti0ThIT/RnAQagXA9nlE15yHAtrW19gdePJh/HaTzUOe/"></script>
  <script src="/assets/vendor/addon-fit.js" integrity="sha384-iF+jqbuti4XlB64clWgFWYEscb+UnSRv3VgVikGYZu+otNFnSHr7y7NcKfBnGizn"></script>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
