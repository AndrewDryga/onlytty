#cloud-config
# Runs on Container-Optimized OS. One container (--network host): the onlytty relay,
# binding the host's :${app_port} so the Google HTTPS load balancer can reach it (the
# LB terminates TLS — not a sidecar proxy), plus epmd + the Erlang distribution ports
# so sibling instances form one BEAM cluster. The image is pulled anonymously from
# public GHCR. SECRET_KEY_BASE is fetched from Secret Manager at boot; the BEAM
# RELEASE_COOKIE is derived from it so rolling updates keep one stable cluster cookie.
#
# Note: dollar-brace placeholders are Terraform interpolation; $NAME (no braces) is shell.

write_files:
  - path: /var/lib/onlytty/start.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      # SECRET_KEY_BASE from Secret Manager via the instance metadata token. A
      # successful-but-empty grep/cut doesn't fail the pipeline under pipefail, so
      # guard each step explicitly — never boot the relay with an empty secret.
      TOKEN=$(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token | cut -d'"' -f4)
      [ -n "$TOKEN" ] || { echo "failed to obtain metadata access token" >&2; exit 1; }
      DATA=$(curl -s -H "Authorization: Bearer $TOKEN" "https://secretmanager.googleapis.com/v1/projects/${project_id}/secrets/${secret_name}/versions/latest:access" | grep -oE '"data": ?"[^"]*"' | cut -d'"' -f4)
      [ -n "$DATA" ] || { echo "failed to read secret ${secret_name} from Secret Manager" >&2; exit 1; }
      SECRET_KEY_BASE=$(printf '%s' "$DATA" | base64 -d)
      [ -n "$SECRET_KEY_BASE" ] || { echo "decoded SECRET_KEY_BASE is empty" >&2; exit 1; }
      # The release bakes a random cookie into each image build. That is fine for one
      # node, but multi-node rolling updates need old and new images to share a cookie
      # while they overlap. Derive a stable, hex-safe cookie from the deployment secret.
      RELEASE_COOKIE=$(printf 'onlytty-release-cookie:%s' "$SECRET_KEY_BASE" | sha256sum | cut -d' ' -f1)
      [ -n "$RELEASE_COOKIE" ] || { echo "failed to derive RELEASE_COOKIE" >&2; exit 1; }
      # This instance's internal IP becomes the BEAM node name (onlytty@<ip>) so peers
      # can reach it; --network host puts epmd + the distribution ports on this IP.
      NODE_IP=$(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/network-interfaces/0/ip)
      [ -n "$NODE_IP" ] || { echo "failed to read this instance's internal IP" >&2; exit 1; }
      docker rm -f onlytty 2>/dev/null || true
      # Public GHCR pull — no credentials. For a private repo, `docker login
      # ghcr.io` here with a read-only PAT injected via Secret Manager.
      docker pull ${container_image}
      # --network host so the app binds the host's :${app_port} for the LB and epmd +
      # the distribution ports (9100-9105) bind the host IP for clustering. The
      # ONLYTTY_CLUSTER_* vars switch on libcluster's GCE strategy, which finds the other
      # relay instances via the Compute API (matched by the cluster_name=onlytty label).
      exec docker run --rm --name onlytty --network host \
        -e SECRET_KEY_BASE="$SECRET_KEY_BASE" \
        -e RELEASE_COOKIE="$RELEASE_COOKIE" \
        -e PHX_SERVER=true -e PHX_HOST=${domain} -e PORT=${app_port} \
        -e NODE_IP="$NODE_IP" \
        -e ONLYTTY_CLUSTER_PROJECT="${project_id}" \
        -e ONLYTTY_CLUSTER_VALUE="onlytty" \
        ${container_image}

  - path: /etc/systemd/system/onlytty.service
    permissions: "0644"
    content: |
      [Unit]
      Description=OnlyTTY relay
      Wants=gcr-online.target network-online.target
      After=gcr-online.target network-online.target
      [Service]
      Restart=always
      RestartSec=5
      ExecStart=/var/lib/onlytty/start.sh
      ExecStop=/usr/bin/docker stop onlytty
      [Install]
      WantedBy=multi-user.target

runcmd:
  - systemctl daemon-reload
  - systemctl enable --now onlytty.service
